<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Budget Planner</title>
<meta name="theme-color" content="#1e40af">
<style>
:root{
  --blue:#1e40af; --green:#15803d; --red:#b91c1c; --purple:#7c3aed;
  --blueSoft:#dbeafe; --greenSoft:#dcfce7; --redSoft:#fee2e2; --purpleSoft:#ede9fe;
  --bg:#f5f7fb; --card:#ffffff; --line:#e2e8f0; --radius:16px;
  --shadow:0 10px 25px rgba(0,0,0,0.08); --text:#0f172a; --muted:#64748b;
}
*{box-sizing:border-box}
body{
  margin:0; font-family:Arial,Helvetica,sans-serif; background:var(--bg); color:var(--text);
}
.app{max-width:1100px; margin:auto; padding:20px}
header{
  background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
  padding:20px; margin-bottom:20px; border-top:6px solid var(--blue);
  display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:14px;
}
h1,h2,h3{margin:0 0 8px}
p{margin:4px 0}
.header-controls{
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
}
.tabs{
  display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;
}
.tab-btn{
  background:#e2e8f0; border:none; padding:10px 14px; border-radius:10px;
  cursor:pointer; font-weight:600; color:#000;
}
.tab-btn.active{background:var(--blue); color:#fff}
.card{
  background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
  padding:18px; margin-bottom:16px;
}
.summary-grid{
  display:grid; grid-template-columns:repeat(4,1fr); gap:16px;
}
.summary{
  padding:14px; border-radius:12px; font-weight:600;
}
.summary.income{background:var(--greenSoft)}
.summary.expense{background:var(--redSoft)}
.summary.transfer{background:var(--purpleSoft)}
.summary.remaining{background:var(--blueSoft)}
.big{font-size:24px; margin-top:6px}
.row{
  display:grid; grid-template-columns:1.5fr 1fr auto; gap:10px; margin-bottom:10px;
}
.transfer-row{
  display:grid; grid-template-columns:1fr 1fr 1fr 1.3fr .8fr auto; gap:10px; margin-bottom:10px;
}
input, select{
  padding:10px; border-radius:10px; border:1px solid var(--line); width:100%;
}
button{
  border:none; padding:10px 12px; border-radius:10px; background:var(--blue);
  color:white; cursor:pointer; font-weight:600;
}
.remove{background:var(--red)}
.ghost{background:#fff; color:var(--text); border:1px solid var(--line)}
.tab-page{display:none}
.tab-page.active{display:block}
.small{font-size:14px; color:var(--muted)}
footer{text-align:center; color:var(--muted); margin-top:10px}
@media(max-width:900px){
  .summary-grid{grid-template-columns:1fr 1fr}
  .row,.transfer-row{grid-template-columns:1fr}
}
@media(max-width:600px){
  .summary-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">

<header>
  <div>
    <h1>Monthly Budget Planner</h1>
    <p class="small">Clean dashboard with month selector, tabs, and automatic saving.</p>
  </div>
  <div class="header-controls">
    <label for="monthSelect" class="small">Month</label>
    <select id="monthSelect" style="min-width:180px"></select>
    <button type="button" id="newMonthBtn">New Month</button>
    <button type="button" id="deleteMonthBtn" class="ghost">Delete Month</button>
  </div>
</header>

<div class="tabs">
  <button type="button" class="tab-btn active" data-tab="summary">Summary</button>
  <button type="button" class="tab-btn" data-tab="income">Income</button>
  <button type="button" class="tab-btn" data-tab="expenses">Expenses</button>
  <button type="button" class="tab-btn" data-tab="transfers">Transfers</button>
</div>

<div id="summary" class="tab-page active">
  <div class="card">
    <h2>Monthly Overview</h2>
    <p class="small">Quick view of income, expenses, transfers, and what is left.</p>
    <div class="summary-grid">
      <div class="summary income">
        Income
        <div class="big" id="totalIncome">£0.00</div>
      </div>
      <div class="summary expense">
        Expenses
        <div class="big" id="totalExpenses">£0.00</div>
      </div>
      <div class="summary transfer">
        Transfers
        <div class="big" id="totalTransfers">£0.00</div>
      </div>
      <div class="summary remaining">
        Remaining
        <div class="big" id="remaining">£0.00</div>
      </div>
    </div>
  </div>
</div>

<div id="income" class="tab-page">
  <div class="card">
    <h2>Income</h2>
    <button type="button" onclick="addRow('income')">Add Income</button>
    <div id="incomeRows" style="margin-top:12px"></div>
  </div>
</div>

<div id="expenses" class="tab-page">
  <div class="card">
    <h2>Expenses</h2>
    <button type="button" onclick="addRow('expenses')">Add Expense</button>
    <div id="expenseRows" style="margin-top:12px"></div>
  </div>
</div>

<div id="transfers" class="tab-page">
  <div class="card">
    <h2>Transfers</h2>
    <button type="button" onclick="addRow('transfers')">Add Transfer</button>
    <div id="transferRows" style="margin-top:12px"></div>
  </div>
</div>

<footer>Saved locally on your device</footer>
</div>

<template id="moneyRow">
  <div class="row">
    <input class="desc" placeholder="Description">
    <input class="amt" type="number" step="0.01" placeholder="Amount">
    <button type="button" class="remove">X</button>
  </div>
</template>

<template id="transferRow">
  <div class="transfer-row">
    <input class="from" placeholder="From">
    <input class="to" placeholder="To">
    <input class="date" type="date">
    <input class="desc" placeholder="Description">
    <input class="amt" type="number" step="0.01" placeholder="Amount">
    <button type="button" class="remove">X</button>
  </div>
</template>

<script>
const STORAGE = "budget_app_single_file_v2";

function defaultMonthName(){
  return new Date().toLocaleString("en-GB",{month:"long",year:"numeric"});
}

function blankMonth(name){
  return {
    name,
    income:[],
    expenses:[],
    transfers:[]
  };
}

function load(){
  try{
    const raw = localStorage.getItem(STORAGE);
    if(!raw){
      const month = blankMonth(defaultMonthName());
      return { selectedMonth: month.name, months: { [month.name]: month } };
    }
    const parsed = JSON.parse(raw);
    if(!parsed.months || !Object.keys(parsed.months).length) throw new Error("bad");
    return parsed;
  }catch{
    const month = blankMonth(defaultMonthName());
    return { selectedMonth: month.name, months: { [month.name]: month } };
  }
}

let state = load();

function save(){
  localStorage.setItem(STORAGE, JSON.stringify(state));
}

function current(){
  return state.months[state.selectedMonth];
}

function sum(arr){
  return arr.reduce((t,r)=>t+Number(r.amount||0),0);
}

function money(n){
  return "£" + Number(n||0).toFixed(2);
}

function updateSummary(){
  const income = sum(current().income);
  const expenses = sum(current().expenses);
  const transfers = sum(current().transfers);
  const remaining = income - expenses - transfers;

  document.getElementById("totalIncome").textContent = money(income);
  document.getElementById("totalExpenses").textContent = money(expenses);
  document.getElementById("totalTransfers").textContent = money(transfers);
  document.getElementById("remaining").textContent = money(remaining);
}

function createRow(type, row){
  const tpl = document.getElementById(type==="transfers" ? "transferRow" : "moneyRow");
  const el = tpl.content.firstElementChild.cloneNode(true);

  if(type==="transfers"){
    el.querySelector(".from").value = row.from || "";
    el.querySelector(".to").value = row.to || "";
    el.querySelector(".date").value = row.date || "";
    el.querySelector(".desc").value = row.desc || "";
    el.querySelector(".amt").value = row.amount || "";
  }else{
    el.querySelector(".desc").value = row.desc || "";
    el.querySelector(".amt").value = row.amount || "";
  }

  el.querySelector(".remove").onclick = () => {
    state[type] = undefined;
  };

  el.querySelector(".remove").onclick = () => {
    const arr = current()[type];
    const idx = arr.indexOf(row);
    if(idx > -1){
      arr.splice(idx,1);
      save();
      render();
    }
  };

  el.oninput = () => {
    if(type==="transfers"){
      row.from = el.querySelector(".from").value;
      row.to = el.querySelector(".to").value;
      row.date = el.querySelector(".date").value;
      row.desc = el.querySelector(".desc").value;
      row.amount = el.querySelector(".amt").value;
    }else{
      row.desc = el.querySelector(".desc").value;
      row.amount = el.querySelector(".amt").value;
    }
    save();
    updateSummary();
  };

  return el;
}

function renderRows(){
  const incomeWrap = document.getElementById("incomeRows");
  const expenseWrap = document.getElementById("expenseRows");
  const transferWrap = document.getElementById("transferRows");

  incomeWrap.innerHTML = "";
  expenseWrap.innerHTML = "";
  transferWrap.innerHTML = "";

  current().income.forEach(r => incomeWrap.appendChild(createRow("income", r)));
  current().expenses.forEach(r => expenseWrap.appendChild(createRow("expenses", r)));
  current().transfers.forEach(r => transferWrap.appendChild(createRow("transfers", r)));
}

function renderMonthSelect(){
  const select = document.getElementById("monthSelect");
  const months = Object.keys(state.months);
  select.innerHTML = months.map(name =>
    `<option value="${name}" ${name===state.selectedMonth ? "selected" : ""}>${name}</option>`
  ).join("");
}

function render(){
  renderMonthSelect();
  renderRows();
  updateSummary();
}

function addRow(type){
  if(type==="transfers"){
    current().transfers.push({from:"",to:"",date:"",desc:"",amount:""});
  }else{
    current()[type].push({desc:"",amount:""});
  }
  save();
  render();
}

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-page").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.tab).classList.add("active");
  });
});

document.getElementById("monthSelect").addEventListener("change", (e) => {
  state.selectedMonth = e.target.value;
  save();
  render();
});

document.getElementById("newMonthBtn").addEventListener("click", () => {
  const name = prompt("Enter month name, for example April 2026");
  if(!name) return;
  const trimmed = name.trim();
  if(!trimmed) return;
  if(!state.months[trimmed]){
    state.months[trimmed] = blankMonth(trimmed);
  }
  state.selectedMonth = trimmed;
  save();
  render();
});

document.getElementById("deleteMonthBtn").addEventListener("click", () => {
  const monthNames = Object.keys(state.months);
  if(monthNames.length === 1){
    alert("You need to keep at least one month.");
    return;
  }
  if(!confirm("Delete " + state.selectedMonth + "?")) return;
  delete state.months[state.selectedMonth];
  state.selectedMonth = Object.keys(state.months)[0];
  save();
  render();
});

render();
</script>
</body>
</html>
